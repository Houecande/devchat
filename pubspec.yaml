name: devchat
description: "Le chat pour les développeurs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^12.0.0
  cupertino_icons: ^1.0.2
  flutter_highlight: ^0.7.0    # Syntax highlighting
  highlight: ^0.7.0
  timeago: ^3.4.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true